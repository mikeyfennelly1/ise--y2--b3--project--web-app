name: pr-checks.yml

on:
  pull_request:
    types: [opened, synchronize, reopened]


permissions:
  contents: read
  pull-requests: read

jobs:
  # Verify that the commit messages contain the valid semantic versioning prefixes.
  # Ensure that the docker image builds.
  verify-commit-msgs:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Validate commit messages
        uses: wagoid/commitlint-github-action@v5
        with:
          configFile: './commitlint.config.js'
          failOnWarnings: true
          commitDepth: 1
